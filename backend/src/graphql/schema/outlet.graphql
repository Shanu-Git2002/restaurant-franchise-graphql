enum OutletStatus {
  ACTIVE
  INACTIVE
  SUSPENDED
}

type Outlet {
  id: ID!
  name: String!
  address: String!
  city: String!
  state: String!
  country: String!
  postalCode: String
  latitude: Float
  longitude: Float
  phone: String
  email: String
  status: OutletStatus!
  openingHours: JSON
  franchise: Franchise!
  manager: User
  employees: [Employee!]!
  employeeCount: Int!
  reviews: [Review!]!
  averageRating: Float
  totalReviews: Int!
  reputationScore: Float
  totalRevenue: Float
  createdAt: DateTime!
  updatedAt: DateTime!
}

type Franchise {
  id: ID!
  name: String!
  slug: String!
  description: String
  logoUrl: String
  website: String
  phone: String
  email: String
  address: String
  owner: User!
  outlets: [Outlet!]!
  outletCount: Int!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type OutletConnection {
  data: [Outlet!]!
  total: Int!
  page: Int!
  limit: Int!
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
}

input CreateOutletInput {
  name: String!
  address: String!
  city: String!
  state: String!
  country: String
  postalCode: String
  latitude: Float
  longitude: Float
  phone: String
  email: String
  openingHours: JSON
  franchiseId: String!
  managerId: String
}

input UpdateOutletInput {
  name: String
  address: String
  city: String
  state: String
  country: String
  postalCode: String
  latitude: Float
  longitude: Float
  phone: String
  email: String
  openingHours: JSON
  status: OutletStatus
  managerId: String
}

input OutletFilterInput {
  search: String
  status: OutletStatus
  city: String
  franchiseId: String
  managerId: String
}

input SortInput {
  field: String!
  direction: String!
}

input PaginationInput {
  page: Int
  limit: Int
}

input CreateFranchiseInput {
  name: String!
  description: String
  logoUrl: String
  website: String
  phone: String
  email: String
  address: String
}

extend type Query {
  outlets(filter: OutletFilterInput, sort: SortInput, pagination: PaginationInput): OutletConnection!
  outlet(id: ID!): Outlet
  franchise: Franchise
}

extend type Mutation {
  createOutlet(input: CreateOutletInput!): Outlet!
  updateOutlet(id: ID!, input: UpdateOutletInput!): Outlet!
  deleteOutlet(id: ID!): MessageResponse!
  assignManager(outletId: ID!, managerId: ID!): Outlet!
  createFranchise(input: CreateFranchiseInput!): Franchise!
}

extend type Subscription {
  outletStatusChanged(franchiseId: ID!): Outlet!
}
